<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Adivina el Número</title>
</head>
<body>
  <h1>Adivina el Número</h1>
  <p>Estoy pensando en un número del 1 al 100.</p>

  <input type="number" id="intento" placeholder="Tu número">
  <button id="botonAdivinar">Adivinar</button>

  <p id="resultado"></p>
  <p id="contador">Intentos: 0</p>
  <button id="botonReiniciar" style="display: none;">Jugar de nuevo</button>

  <script src="app.js"></script>
</body>
</html>
